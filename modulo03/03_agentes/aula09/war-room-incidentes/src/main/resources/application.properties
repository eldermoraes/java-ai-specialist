# Modelo robusto (correlação de hipóteses + relatório de causa raiz)
quarkus.langchain4j.ollama.chat-model.model-id=deepseek-v4-pro:cloud
quarkus.langchain4j.ollama.chat-model.temperature=0.2
# Teto folgado: o pro raciocina (thinking) antes do texto final — sem folga, o orçamento
# de tokens pode acabar no raciocínio e o modelo devolve resposta vazia (estado blank
# nunca entra no quadro -> quiescência sem relatório)
quarkus.langchain4j.ollama.chat-model.num-predict=8192
quarkus.langchain4j.timeout=180s

# Modelo barato (analistas de evidência + gerador de exemplos)
quarkus.langchain4j.ollama.smaller.chat-model.model-id=gemma4:31b-cloud
quarkus.langchain4j.ollama.smaller.chat-model.temperature=0.2
quarkus.langchain4j.ollama.smaller.timeout=90s
quarkus.langchain4j.ollama.smaller.chat-model.num-predict=2048

quarkus.langchain4j.devservices.preload=false
quarkus.langchain4j.ollama.devservices.enabled=false

quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# Blackboard: teto de passos do planner (condição de parada nº 3)
warroom.max-passos=12
