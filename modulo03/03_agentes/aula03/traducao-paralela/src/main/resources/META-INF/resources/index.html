<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradução Paralela - Parallel Pattern</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f6fa;
            color: #1f2330;
        }
        .app { max-width: 1300px; margin: 0 auto; padding: 24px; }

        header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; padding: 18px 22px;
            background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
            color: white; border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        header h1 { margin: 0; font-size: 20px; font-weight: 600; }
        header .subtitle { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .status {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px; border-radius: 999px;
            font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .status::before {
            content: ""; width: 8px; height: 8px; border-radius: 50%;
            background: #94a3b8; transition: background 0.2s;
        }
        .status.connected::before { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .status.connecting::before { background: #fbbf24; animation: pulse 1.2s infinite; }
        .status.disconnected::before { background: #f87171; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .input-card {
            background: white; padding: 18px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .input-card label {
            display: block; font-size: 12px; font-weight: 600;
            color: #6b7280; text-transform: uppercase;
            letter-spacing: 0.04em; margin-bottom: 8px;
        }
        .input-card textarea {
            width: 100%; min-height: 140px;
            padding: 12px 14px;
            border: 1px solid #d3d8e0;
            border-radius: 8px;
            font-family: inherit; font-size: 14px;
            line-height: 1.5; resize: vertical; outline: none;
        }
        .input-card textarea:focus { border-color: #2563eb; }

        .action-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px;
        }
        .progress {
            font-size: 13px; color: #6b7280; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        button.primary {
            padding: 12px 26px; border: none; border-radius: 10px;
            background: #2563eb; color: white;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        button.primary:hover { background: #1d4ed8; }
        button.primary:disabled { background: #94a3b8; cursor: not-allowed; }
        button.ghost {
            padding: 12px 18px; border: 1px solid #d3d8e0;
            background: white; color: #1f2330;
            border-radius: 10px; font-size: 14px;
            cursor: pointer; margin-right: 8px;
        }

        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;
        }
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }

        .card {
            background: white; border-radius: 12px;
            padding: 16px; min-height: 220px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; gap: 8px;
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
        }
        .flag { font-size: 26px; line-height: 1; }
        .lang-code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px; font-weight: 700; color: #6b7280;
        }
        .timer {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 11px; color: #94a3b8;
        }
        .card.pending { opacity: 0.7; }
        .card.pending .body { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-style: italic; font-size: 13px; }
        .card.done .titulo { font-weight: 700; font-size: 14px; color: #1f2330; }
        .card.done .corpo {
            font-size: 13px; color: #4b5563; line-height: 1.5;
            white-space: pre-wrap; flex: 1;
        }
        .card.done .notas {
            margin-top: 6px; font-size: 11px; color: #6b7280;
            border-top: 1px dashed #e6e9ef; padding-top: 6px;
        }
        .card.done .notas summary {
            cursor: pointer; color: #2563eb; font-weight: 600;
        }
        .card.done .notas li { margin: 4px 0; }
        .card.error { background: #fef2f2; border: 1px solid #fecaca; }
        .card.error .body { color: #991b1b; font-size: 12px; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid #e6e9ef;
            border-top-color: #2563eb; border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .examples {
            margin-top: 8px; font-size: 12px; color: #6b7280;
        }
        .examples a { color: #2563eb; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div>
            <h1>🌐 Tradução Paralela</h1>
            <div class="subtitle">Padrão Parallel · 1 agente · 5 invocações concorrentes (PT → EN/ES/FR/DE/ZH)</div>
        </div>
        <span class="status connecting" id="statusBadge">conectando</span>
    </header>

    <div class="input-card">
        <label for="comunicadoInput">Comunicado em Português</label>
        <textarea id="comunicadoInput" placeholder="Cole aqui o comunicado interno em PT-BR…"></textarea>
        <div class="examples">
            <a id="exampleBtn">↳ usar comunicado de exemplo</a>
        </div>
    </div>

    <div class="action-bar">
        <div class="progress" id="progress">aguardando comunicado…</div>
        <div>
            <button type="button" class="ghost" id="resetBtn">Limpar</button>
            <button type="button" class="primary" id="translateBtn" disabled>Traduzir em paralelo</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>
</div>

<script>
    const statusEl = document.getElementById('statusBadge');
    const comunicadoInput = document.getElementById('comunicadoInput');
    const translateBtn = document.getElementById('translateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const grid = document.getElementById('grid');
    const progressEl = document.getElementById('progress');

    const IDIOMAS = [
        { codigo: 'EN', flag: '🇺🇸', nome: 'English' },
        { codigo: 'ES', flag: '🇪🇸', nome: 'Español' },
        { codigo: 'FR', flag: '🇫🇷', nome: 'Français' },
        { codigo: 'DE', flag: '🇩🇪', nome: 'Deutsch' },
        { codigo: 'ZH', flag: '🇨🇳', nome: '中文' }
    ];

    let ws = null;
    let totalDone = 0;

    function setStatus(state, label) {
        statusEl.className = 'status ' + state;
        statusEl.textContent = label;
    }

    function renderInitialCards() {
        grid.innerHTML = '';
        totalDone = 0;
        IDIOMAS.forEach(i => {
            const card = document.createElement('div');
            card.className = 'card pending';
            card.id = 'card-' + i.codigo;
            card.innerHTML = `
                <div class="card-header">
                    <div><span class="flag">${i.flag}</span> <span class="lang-code">${i.codigo}</span></div>
                    <div class="timer">—</div>
                </div>
                <div class="body"><span class="spinner"></span>aguardando…</div>
            `;
            grid.appendChild(card);
        });
        progressEl.textContent = '0/5 traduções concluídas';
    }

    function renderDone(lang, traducao, elapsedMs) {
        const card = document.getElementById('card-' + lang);
        if (!card) return;
        const idioma = IDIOMAS.find(i => i.codigo === lang) || { flag: '🌐', codigo: lang };
        const elapsedSec = (elapsedMs / 1000).toFixed(1) + 's';
        const isError = traducao.falhou;
        card.className = 'card ' + (isError ? 'error' : 'done');
        if (isError) {
            card.innerHTML = `
                <div class="card-header">
                    <div><span class="flag">${idioma.flag}</span> <span class="lang-code">${lang}</span></div>
                    <div class="timer">${elapsedSec}</div>
                </div>
                <div class="body">⚠️ ${escapeHtml(traducao.erro || 'erro desconhecido')}</div>
            `;
        } else {
            const notas = (traducao.notasAdaptacao || []).map(n => `<li>${escapeHtml(n)}</li>`).join('');
            card.innerHTML = `
                <div class="card-header">
                    <div><span class="flag">${idioma.flag}</span> <span class="lang-code">${lang}</span></div>
                    <div class="timer">${elapsedSec}</div>
                </div>
                <div class="titulo">${escapeHtml(traducao.titulo || '')}</div>
                <div class="corpo">${escapeHtml(traducao.corpo || '')}</div>
                ${notas ? `<details class="notas"><summary>Notas de adaptação cultural (${(traducao.notasAdaptacao || []).length})</summary><ul>${notas}</ul></details>` : ''}
            `;
        }
        totalDone++;
        progressEl.textContent = `${totalDone}/5 traduções concluídas`;
    }

    function renderError(lang, error, elapsedMs) {
        renderDone(lang, { falhou: true, erro: error }, elapsedMs);
    }

    function escapeHtml(s) {
        return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]);
    }

    function connect() {
        setStatus('connecting', 'conectando');
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + location.host + '/ws/traducao');
        ws.onopen = () => {
            setStatus('connected', 'conectado');
            translateBtn.disabled = false;
        };
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'STARTED') {
                renderInitialCards();
                progressEl.textContent = 'compondo agentes — @ParallelMapperAgent rodando os 5 idiomas em paralelo…';
            } else if (msg.type === 'ALL_DONE') {
                (msg.traducoes || []).forEach(t => {
                    if (t && t.idioma) renderDone(t.idioma, t, 0);
                });
                progressEl.textContent = `5/5 traduções concluídas — pronto`;
                translateBtn.disabled = false;
            } else if (msg.type === 'ERROR') {
                progressEl.textContent = '❌ ' + (msg.error || 'erro desconhecido');
                translateBtn.disabled = false;
            }
        };
        ws.onclose = () => { setStatus('disconnected', 'desconectado'); translateBtn.disabled = true; };
        ws.onerror = () => { setStatus('disconnected', 'erro'); };
    }

    translateBtn.addEventListener('click', () => {
        const comunicado = comunicadoInput.value.trim();
        if (!comunicado) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        renderInitialCards();
        translateBtn.disabled = true;
        ws.send(JSON.stringify({ comunicado }));
    });

    resetBtn.addEventListener('click', () => {
        comunicadoInput.value = '';
        grid.innerHTML = '';
        progressEl.textContent = 'aguardando comunicado…';
    });

    document.getElementById('exampleBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        const link = e.currentTarget;
        const original = link.textContent;
        link.textContent = '↻ gerando…';
        link.style.pointerEvents = 'none';
        comunicadoInput.disabled = true;
        try {
            const resp = await fetch('/api/example/comunicado');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            comunicadoInput.value = await resp.text();
        } catch (err) {
            comunicadoInput.placeholder = 'Falha ao gerar exemplo: ' + err.message;
        } finally {
            link.textContent = original;
            link.style.pointerEvents = '';
            comunicadoInput.disabled = false;
        }
    });

    connect();
</script>
</body>
</html>
