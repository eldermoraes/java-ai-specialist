<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação de Desconto B2B - HITL</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f6fa;
            color: #1f2330;
        }
        .app { max-width: 1400px; margin: 0 auto; padding: 24px; }

        header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding: 18px 22px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white; border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 20px; font-weight: 600; }
        header .subtitle { font-size: 12px; opacity: 0.7; margin-top: 4px; }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column;
            min-height: 600px;
        }
        .panel.vendedor { border-top: 5px solid #2563eb; }
        .panel.gerente  { border-top: 5px solid #16a34a; }

        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e6e9ef;
        }
        .panel-header h2 {
            margin: 0; font-size: 16px; font-weight: 700;
        }
        .panel.vendedor h2 { color: #2563eb; }
        .panel.gerente h2 { color: #16a34a; }

        .status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 3px 10px; border-radius: 999px;
            font-size: 11px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            background: #f3f4f6;
        }
        .status::before {
            content: ""; width: 7px; height: 7px; border-radius: 50%;
            background: #94a3b8;
        }
        .status.connected::before { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
        .status.connecting::before { background: #fbbf24; animation: pulse 1.2s infinite; }
        .status.disconnected::before { background: #f87171; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        textarea {
            width: 100%; min-height: 90px;
            padding: 10px 12px;
            border: 1px solid #d3d8e0;
            border-radius: 8px;
            font-family: inherit; font-size: 13px;
            line-height: 1.5; resize: vertical; outline: none;
            margin-bottom: 8px;
        }
        textarea:focus { border-color: #2563eb; }

        button.primary-vendedor {
            padding: 10px 20px; border: none; border-radius: 8px;
            background: #2563eb; color: white;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        button.primary-vendedor:hover { background: #1d4ed8; }
        button.primary-vendedor:disabled { background: #94a3b8; cursor: not-allowed; }

        .timeline {
            margin-top: 16px;
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
        }
        .event {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px; line-height: 1.4;
            border-left: 3px solid #94a3b8;
            background: #f9fafb;
        }
        .event-time {
            font-size: 10px; color: #94a3b8;
            margin-bottom: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .event-info { border-left-color: #2563eb; }
        .event-warn { border-left-color: #f59e0b; background: #fef3c7; }
        .event-success { border-left-color: #16a34a; background: #dcfce7; }
        .event-error { border-left-color: #dc2626; background: #fee2e2; color: #7f1d1d; }
        .resposta-final {
            margin-top: 10px;
            background: white; border: 2px solid #16a34a;
            border-radius: 8px; padding: 12px;
            font-size: 13px; line-height: 1.6;
            white-space: pre-wrap;
        }

        .proposta-card {
            background: #f9fafb;
            border: 1px solid #e6e9ef;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 4px solid #d3d8e0;
            transition: all 0.2s;
        }
        .proposta-card.PENDENTE { border-left-color: #f59e0b; background: #fffbeb; }
        .proposta-card.APROVADA { border-left-color: #16a34a; background: #f0fdf4; opacity: 0.85; }
        .proposta-card.REJEITADA { border-left-color: #dc2626; background: #fef2f2; opacity: 0.85; }
        .proposta-card.CONTRAPROPOSTA { border-left-color: #8b5cf6; background: #faf5ff; opacity: 0.85; }
        .proposta-card.EXPIRADA { border-left-color: #94a3b8; background: #f9fafb; opacity: 0.6; }

        .proposta-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; color: #6b7280;
            margin-bottom: 6px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .badge-status {
            font-weight: 700; padding: 2px 8px; border-radius: 999px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .badge-PENDENTE { background: #fef3c7; color: #92400e; }
        .badge-APROVADA { background: #dcfce7; color: #166534; }
        .badge-REJEITADA { background: #fee2e2; color: #991b1b; }
        .badge-CONTRAPROPOSTA { background: #ede9fe; color: #5b21b6; }
        .badge-EXPIRADA { background: #e5e7eb; color: #374151; }

        .proposta-card .pedido { font-size: 12px; color: #4b5563; line-height: 1.4; margin: 4px 0; }
        .proposta-card .desconto {
            font-size: 22px; font-weight: 800;
            color: #1f2330;
            margin: 6px 0;
        }
        .proposta-card .justificativa {
            font-size: 12px; color: #6b7280; font-style: italic; line-height: 1.4;
            margin: 4px 0;
        }
        .acoes {
            display: flex; gap: 6px; margin-top: 10px;
            flex-wrap: wrap;
        }
        .acoes button {
            padding: 6px 12px; font-size: 12px;
            border: none; border-radius: 6px;
            cursor: pointer; font-weight: 600;
        }
        .btn-aprovar { background: #16a34a; color: white; }
        .btn-aprovar:hover { background: #15803d; }
        .btn-rejeitar { background: #dc2626; color: white; }
        .btn-rejeitar:hover { background: #b91c1c; }
        .btn-contrapor { background: #8b5cf6; color: white; }
        .btn-contrapor:hover { background: #7c3aed; }
        .contrapor-form {
            display: none; margin-top: 8px;
            gap: 6px; align-items: center; flex-wrap: wrap;
        }
        .contrapor-form input[type=number], .contrapor-form input[type=text] {
            padding: 6px 8px; border: 1px solid #d3d8e0;
            border-radius: 6px; font-size: 12px;
        }
        .contrapor-form input[type=number] { width: 80px; }
        .contrapor-form input[type=text] { flex: 1; min-width: 150px; }
        .empty-state {
            text-align: center; color: #94a3b8;
            font-size: 13px; padding: 30px 10px;
        }
        .examples { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        .examples button {
            background: #f3f4f6; border: 1px solid #e5e7eb;
            padding: 3px 10px; border-radius: 999px;
            font-size: 11px; color: #4b5563;
            cursor: pointer;
        }
        .examples button:hover { background: #e5e7eb; }

        .observacao-decidida {
            margin-top: 6px; padding: 6px 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 6px;
            font-size: 11px; color: #4b5563;
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div>
            <h1>💼 Aprovação de Desconto B2B</h1>
            <div class="subtitle">Padrão Human-in-the-Loop · vendedor pede · agente prepara · gerente decide · agente responde</div>
        </div>
        <div style="font-size:11px;opacity:0.7;">Tela única: simule ambos os papéis lado a lado</div>
    </header>

    <div class="layout">
        <!-- Painel Vendedor -->
        <div class="panel vendedor">
            <div class="panel-header">
                <h2>👤 Vendedor</h2>
                <span class="status connecting" id="statusVendedor">conectando</span>
            </div>

            <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:#6b7280;font-weight:600;display:block;margin-bottom:4px;">Descreva o pedido</label>
            <textarea id="pedidoInput" placeholder="Ex: cliente Acme quer 500 licenças do plano Pro com pagamento à vista, urgente para fechar contrato Q2…"></textarea>
            <div class="examples">
                <button data-example="auto">↻ gerar pedido de exemplo</button>
            </div>
            <div style="display:flex;justify-content:flex-end;">
                <button class="primary-vendedor" id="enviarBtn" disabled>Enviar Pedido</button>
            </div>

            <div class="timeline" id="vendedorTimeline">
                <div class="empty-state">Envie um pedido para começar.</div>
            </div>
        </div>

        <!-- Painel Gerente -->
        <div class="panel gerente">
            <div class="panel-header">
                <h2>🏢 Gerente Comercial</h2>
                <span class="status connecting" id="statusGerente">conectando</span>
            </div>

            <div id="propostasContainer">
                <div class="empty-state">Aguardando propostas para aprovar…</div>
            </div>
        </div>
    </div>
</div>

<script>
    const statusVendedor = document.getElementById('statusVendedor');
    const statusGerente = document.getElementById('statusGerente');
    const pedidoInput = document.getElementById('pedidoInput');
    const enviarBtn = document.getElementById('enviarBtn');
    const vendedorTimeline = document.getElementById('vendedorTimeline');
    const propostasContainer = document.getElementById('propostasContainer');

    const VENDEDOR_ID = 'v1';

    let wsVendedor = null;
    let wsGerente = null;
    let propostasMap = new Map();

    function setStatus(el, state, label) {
        el.className = 'status ' + state;
        el.textContent = label;
    }

    function nowTime() {
        return new Date().toLocaleTimeString('pt-BR');
    }

    function addVendedorEvent(text, cls) {
        const empty = vendedorTimeline.querySelector('.empty-state');
        if (empty) empty.remove();
        const div = document.createElement('div');
        div.className = 'event ' + cls;
        div.innerHTML = `<div class="event-time">${nowTime()}</div>${text}`;
        vendedorTimeline.appendChild(div);
        vendedorTimeline.scrollTop = vendedorTimeline.scrollHeight;
        return div;
    }

    function addRespostaFinal(text) {
        const div = document.createElement('div');
        div.className = 'resposta-final';
        div.textContent = text;
        vendedorTimeline.appendChild(div);
        vendedorTimeline.scrollTop = vendedorTimeline.scrollHeight;
    }

    function escapeHtml(s) {
        return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]);
    }

    function renderPropostas() {
        const all = Array.from(propostasMap.values()).sort((a, b) => b.id - a.id);
        if (all.length === 0) {
            propostasContainer.innerHTML = '<div class="empty-state">Aguardando propostas para aprovar…</div>';
            return;
        }
        propostasContainer.innerHTML = all.map(p => renderProposta(p)).join('');
        bindActions();
    }

    function renderProposta(p) {
        const pct = p.percentualProposto != null ? p.percentualProposto : '—';
        const decididoEm = p.decididoEm ? `decidida em ${new Date(p.decididoEm).toLocaleTimeString('pt-BR')}` : '';
        const finalPct = p.percentualFinal != null ? p.percentualFinal : pct;
        const obsDecidida = (p.status !== 'PENDENTE' && p.observacaoGerente)
            ? `<div class="observacao-decidida"><strong>Observação:</strong> ${escapeHtml(p.observacaoGerente)} ${p.status === 'CONTRAPROPOSTA' ? ` · novo desconto: <strong>${finalPct}%</strong>` : ''}</div>` : '';
        const actions = p.status === 'PENDENTE' ? `
            <div class="acoes">
                <button class="btn-aprovar" data-action="aprovar" data-id="${p.id}">✓ Aprovar</button>
                <button class="btn-rejeitar" data-action="rejeitar" data-id="${p.id}">✕ Rejeitar</button>
                <button class="btn-contrapor" data-action="contrapor-toggle" data-id="${p.id}">↻ Contrapor</button>
            </div>
            <form class="contrapor-form" data-form-id="${p.id}">
                <input type="number" step="0.5" min="0" max="100" placeholder="Novo %" required>
                <input type="text" placeholder="Justificativa (opcional)">
                <button type="submit" class="btn-contrapor">Enviar contraproposta</button>
            </form>
        ` : '';
        return `
            <div class="proposta-card ${p.status}" data-pid="${p.id}">
                <div class="proposta-meta">
                    <span>#${p.id} · vendedor: ${escapeHtml(p.vendedorId)} · ${new Date(p.criadoEm).toLocaleTimeString('pt-BR')}</span>
                    <span class="badge-status badge-${p.status}">${p.status}</span>
                </div>
                <div class="pedido">${escapeHtml(p.descricaoPedido)}</div>
                <div class="desconto">${pct}% <span style="font-size:12px;color:#6b7280;font-weight:normal;">de desconto proposto</span></div>
                <div class="justificativa">"${escapeHtml(p.justificativaAgente || '')}"</div>
                <div style="font-size:11px;color:#6b7280;">Condições: ${escapeHtml(p.condicoes || '—')}</div>
                ${actions}
                ${obsDecidida}
            </div>
        `;
    }

    function bindActions() {
        propostasContainer.querySelectorAll('button[data-action]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = parseInt(btn.dataset.id);
                const action = btn.dataset.action;
                if (action === 'aprovar') sendDecision(id, 'APROVADA', null, null);
                else if (action === 'rejeitar') sendDecision(id, 'REJEITADA', null, null);
                else if (action === 'contrapor-toggle') {
                    const form = propostasContainer.querySelector(`form[data-form-id="${id}"]`);
                    form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
                }
            });
        });
        propostasContainer.querySelectorAll('form[data-form-id]').forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const id = parseInt(form.dataset.formId);
                const pct = parseFloat(form.querySelector('input[type=number]').value);
                const obs = form.querySelector('input[type=text]').value || 'contraproposta do gerente';
                sendDecision(id, 'CONTRAPROPOSTA', pct, obs);
            });
        });
    }

    function sendDecision(propostaId, status, percentualFinal, observacao) {
        if (!wsGerente || wsGerente.readyState !== WebSocket.OPEN) return;
        wsGerente.send(JSON.stringify({ propostaId, status, percentualFinal, observacao }));
    }

    function connectVendedor() {
        setStatus(statusVendedor, 'connecting', 'conectando');
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        wsVendedor = new WebSocket(proto + '//' + location.host + '/ws/vendedor/' + VENDEDOR_ID);
        wsVendedor.onopen = () => { setStatus(statusVendedor, 'connected', 'conectado'); enviarBtn.disabled = false; };
        wsVendedor.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'RECEBIDO') {
                addVendedorEvent('📨 ' + msg.message, 'event-info');
            } else if (msg.type === 'PROPOSTA_PREPARADA') {
                addVendedorEvent(`📋 Proposta #${msg.payload.id} preparada: <strong>${msg.payload.percentualProposto}%</strong> de desconto · enviada para aprovação do gerente`, 'event-warn');
            } else if (msg.type === 'DECIDIDA') {
                const status = msg.payload.status;
                const cls = status === 'APROVADA' ? 'event-success' : status === 'REJEITADA' ? 'event-error' : 'event-warn';
                addVendedorEvent(`✅ Decisão recebida: <strong>${status}</strong>`, cls);
                addRespostaFinal(msg.message);
                enviarBtn.disabled = false;
            } else if (msg.type === 'ERROR') {
                addVendedorEvent('❌ ' + msg.message, 'event-error');
                enviarBtn.disabled = false;
            }
        };
        wsVendedor.onclose = () => { setStatus(statusVendedor, 'disconnected', 'desconectado'); enviarBtn.disabled = true; };
        wsVendedor.onerror = () => setStatus(statusVendedor, 'disconnected', 'erro');
    }

    function connectGerente() {
        setStatus(statusGerente, 'connecting', 'conectando');
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        wsGerente = new WebSocket(proto + '//' + location.host + '/ws/gerente');
        wsGerente.onopen = () => setStatus(statusGerente, 'connected', 'conectado');
        wsGerente.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'SNAPSHOT') {
                propostasMap.clear();
                (msg.propostas || []).forEach(p => propostasMap.set(p.id, p));
                renderPropostas();
            } else if (msg.type === 'NOVA' || msg.type === 'ATUALIZADA') {
                if (msg.proposta) {
                    propostasMap.set(msg.proposta.id, msg.proposta);
                    renderPropostas();
                }
            }
        };
        wsGerente.onclose = () => setStatus(statusGerente, 'disconnected', 'desconectado');
        wsGerente.onerror = () => setStatus(statusGerente, 'disconnected', 'erro');
    }

    enviarBtn.addEventListener('click', () => {
        const desc = pedidoInput.value.trim();
        if (!desc || !wsVendedor || wsVendedor.readyState !== WebSocket.OPEN) return;
        enviarBtn.disabled = true;
        wsVendedor.send(JSON.stringify({ descricao: desc }));
        pedidoInput.value = '';
    });

    document.querySelectorAll('[data-example]').forEach(b => {
        b.addEventListener('click', async () => {
            const original = b.textContent;
            b.textContent = '↻ gerando…';
            b.disabled = true;
            try {
                const resp = await fetch('/api/example/pedido');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                pedidoInput.value = await resp.text();
            } catch (err) {
                pedidoInput.placeholder = 'Falha ao gerar exemplo: ' + err.message;
            } finally {
                b.textContent = original;
                b.disabled = false;
            }
        });
    });

    connectVendedor();
    connectGerente();
</script>
</body>
</html>
